name: Test and build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.13.1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        id: cache-pnpm
        uses: actions/cache@v6
        env:
          cache-name: pnpm-store
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ env.NODE_VERSION }}-${{ env.cache-name }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_VERSION }}-${{ env.cache-name }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and typecheck
        run: pnpm exec turbo run lint:ci typecheck --filter=backend

      - name: Unit and e2e tests
        run: pnpm exec turbo run test test:e2e --filter=backend

      - name: Build backend
        run: pnpm backend:build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        id: cache-pnpm
        uses: actions/cache@v6
        env:
          cache-name: pnpm-store
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ env.NODE_VERSION }}-${{ env.cache-name }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.NODE_VERSION }}-${{ env.cache-name }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and typecheck
        run: pnpm exec turbo run lint:ci typecheck --filter=frontend

      - name: Install Playwright Chromium
        run: pnpm --filter frontend exec playwright install chromium --with-deps

      - name: Run frontend tests
        run: pnpm frontend:test

      - name: Build frontend
        run: pnpm frontend:build
